name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  build-backend:
    name: Build .NET backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/ChatApp/ChatApp.csproj

      - name: Build
        run: dotnet build src/ChatApp/ChatApp.csproj -c Release --no-restore

      - name: Test
        run: |
          if ls tests/**/*.csproj >/dev/null 2>&1; then
            dotnet test -c Release --no-build
          else
            echo "No test projects found; skipping."
          fi

  build-widget:
    name: Build embeddable widget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ChatApp/widget
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build bundle
        run: npm run build
